services:
  app:
    image: shazamer_app:latest
    container_name: shazamer_blue
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./outputs:/app/outputs
      - ./uploads:/app/uploads
      - ./tmp:/app/tmp
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: shared_infra
    external: true
