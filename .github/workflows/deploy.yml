name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-action

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          HOST=$(echo "$SSH_HOST" | cut -d':' -f1)
          PORT=$(echo "$SSH_HOST" | grep -o ':[0-9]*' | cut -d':' -f2 || echo "22")
          ssh-keyscan -H -p $PORT $HOST >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          HOST=$(echo $SSH_HOST | cut -d':' -f1)
          PORT=$(echo $SSH_HOST | grep -o ':[0-9]*' | cut -d':' -f2 || echo "22")

          ssh -p $PORT $SSH_USER@$HOST "
            set -e
            cd $DEPLOY_PATH

            # Update code
            git fetch origin
            git reset --hard origin/main

            # Run blue-green deployment
            bash scripts/blue-green-deploy.sh
          "

      - name: Health check
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          HOST=$(echo $SSH_HOST | cut -d':' -f1)
          PORT=$(echo $SSH_HOST | grep -o ':[0-9]*' | cut -d':' -f2 || echo "22")

          echo "Running health checks..."
          ACTIVE_ENV=$(ssh -p $PORT $SSH_USER@$HOST "cat $DEPLOY_PATH/.deploy-env | grep ACTIVE_ENV | cut -d= -f2")
          echo "Active environment: $ACTIVE_ENV"

          if ssh -p $PORT $SSH_USER@$HOST "docker exec shazamer_$ACTIVE_ENV python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/').read()\""; then
            echo "Health check passed!"
          else
            echo "Health check failed!"
            ssh -p $PORT $SSH_USER@$HOST "docker logs shazamer_$ACTIVE_ENV --tail 50"
            exit 1
          fi

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deployment to shazamer.pierregallet.com completed successfully!"
          else
            echo "Deployment failed! Check the logs for more information."
          fi
