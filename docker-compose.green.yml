services:
  app:
    image: shazamer_app:latest
    container_name: shazamer_green
    restart: unless-stopped
    mem_limit: 6g
    memswap_limit: 6g
    env_file:
      - path: .env
        required: false
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHON_ENV=Production
      - MAX_AUDIO_DURATION_SECONDS=7200
    volumes:
      - ./outputs:/app/outputs
      - ./uploads:/app/uploads
      - ./tmp:/app/tmp
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: shared_infra
    external: true
